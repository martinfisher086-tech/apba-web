  <!-- APBA logotype -->
  <text x="80" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="700" fill="#FFFFFF" letter-spacing="-2">APBA</text>
  <!-- Full name -->
  <text x="80" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.75)">Asociación de Psicólogas y Psicólogos de Buenos Aires</text>
  <!-- URL -->
  <text x="80" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.5)">psicologos.org.ar</text>
